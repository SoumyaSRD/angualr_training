name: CI / CD (Angular → GitHub Pages + Docker)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write        # ← NEW: required to push to GHCR

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Existing steps (unchanged) ──────────────────────────

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: |
          npm run build -- \
          --configuration production \
          --base-href "/${{ github.event.repository.name }}/"

      - name: Create 404 fallback
        run: |
          cp dist/angular-training/browser/index.html \
             dist/angular-training/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/angular-training/browser
          publish_branch: gh-pages

      # ── NEW: Docker steps ────────────────────────────────────

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}        # Your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }} # Auto-provided, no setup needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Image name format: ghcr.io/YOUR_USERNAME/REPO_NAME
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max